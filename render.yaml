# Render Blueprint — OpenLearn AI Service
services:
  - type: web
    name: openlearn-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd ai-service && pip install -r requirements.txt
    startCommand: cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
